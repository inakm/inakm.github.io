    <style>
        body {
            background-color: #000000;
            color: #222222;
            overflow-x: hidden;
            font-family: 'Manrope', sans-serif;
            cursor: none;
        }

        * {
            cursor: none !important;
        }

        .cursor-dot,
        .cursor-outline {
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
            mix-blend-mode: difference;
        }

        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: white;
        }

        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 1px solid white;
            transition: width 0.2s, height 0.2s, background-color 0.2s;
        }

        .cursor-outline.hover-active {
            width: 60px;
            height: 60px;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .liquid-glass {
            background: rgba(255, 255, 255, 0.01);
            background-blend-mode: luminosity;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: none;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .liquid-glass::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1.4px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.45) 0%, rgba(255, 255, 255, 0.15) 20%, rgba(255, 255, 255, 0) 40%, rgba(255, 255, 255, 0) 60%, rgba(255, 255, 255, 0.15) 80%, rgba(255, 255, 255, 0.45) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        @keyframes fade-rise {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-rise {
            animation: fade-rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .animate-fade-rise-delay {
            animation: fade-rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        .animate-fade-rise-delay-2 {
            animation: fade-rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
        }

        .animate-fade-rise-delay-3 {
            animation: fade-rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.6s both;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .animate-glitch:hover {
            animation: glitch 0.3s ease-in-out infinite;
        }

        .magnetic-wrap {
            display: inline-block;
        }

        .magnetic-inner {
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform;
        }

        .magnetic-btn {
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform;
        }
    </style>
</head>

<body class="antialiased selection:bg-brand-primary selection:text-white">

    <footer class="relative z-10 py-8 border-t border-white/5">

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        const cursorDot = document.getElementById('cursor-dot');
        const cursorOutline = document.getElementById('cursor-outline');

        document.addEventListener('mousemove', (e) => {
            cursorDot.style.left = e.clientX + 'px';
            cursorDot.style.top = e.clientY + 'px';

            cursorOutline.style.left = e.clientX + 'px';
            cursorOutline.style.top = e.clientY + 'px';
        });

        document.querySelectorAll('a, button, .magnetic-wrap, .magnetic-btn').forEach(el => {
            el.addEventListener('mouseenter', () => cursorOutline.classList.add('hover-active'));
            el.addEventListener('mouseleave', () => cursorOutline.classList.remove('hover-active'));
        });

        document.querySelectorAll('.magnetic-wrap, .magnetic-btn').forEach(wrapper => {
            wrapper.addEventListener('mousemove', (e) => {
                const rect = wrapper.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                const inner = wrapper.querySelector('.magnetic-inner, .magnetic-btn');
                if (inner) {
                    inner.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
                }
            });

            wrapper.addEventListener('mouseleave', () => {
                const inner = wrapper.querySelector('.magnetic-inner, .magnetic-btn');
                if (inner) {
                    inner.style.transform = 'translate(0, 0)';
                }
            });
        });
    </script>
