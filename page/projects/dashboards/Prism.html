<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism Sales Dashboard | Anjani Kumar Mishra</title>
    <link rel="icon" type="image/png" href="../../../mypfpf.png">
    <meta name="description" content="Prism Sales Interactive Dashboard powered by local CSV data.">
    <meta name="author" content="Anjani Kumar Mishra">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PapaParse for parsing CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Chart.js for visualizations -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Anton', 'sans-serif'],
                        body: ['Manrope', 'sans-serif'],
                        mono: ['Courier New', 'monospace'],
                    },
                    colors: {
                        brand: {
                            stormy: '#006466', darkTeal: '#065a60', charcoal: '#1b3a4b', deepSpace: '#212f45',
                            indigo: '#272640', midnight: '#312244', deepPurple: '#4d194d', lavender: '#d5cfe1',
                            white: '#ffffff', highlight: '#f3c623', pbi: '#F2C811', positive: '#00FA9A', negative: '#FF6347'
                        }
                    },
                    backgroundImage: {
                        'ledger-pattern': 'linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #1a1a1d;
            background-image: linear-gradient(135deg, #1b3a4b 0%, #212f45 50%, #312244 100%);
            color: #d5cfe1; overflow-x: hidden;
        }
        .bg-grid { background-size: 50px 50px; background-position: center; }
        .card-3d {
            background: rgba(33, 47, 69, 0.7); border: 1px solid rgba(148, 149, 139, 0.3);
            box-shadow: 4px 4px 0px rgba(0, 100, 102, 0.5); transition: all 0.2s ease;
        }
        .card-3d:hover {
            transform: translate(-1px, -1px); box-shadow: 6px 6px 0px rgba(0, 100, 102, 0.8);
            background: rgba(33, 47, 69, 0.9); border-color: #d5cfe1;
        }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #1b3a4b; }
        ::-webkit-scrollbar-thumb { background: #006466; border: 2px solid #1b3a4b; border-radius: 4px; }
        
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #f3c623; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased relative font-body bg-grid bg-ledger-pattern selection:bg-brand-stormy selection:text-white">

    <nav class="fixed top-4 md:top-6 left-1/2 -translate-x-1/2 z-50 w-[94%] max-w-5xl">
        <div class="bg-brand-deepSpace/90 backdrop-blur-xl border border-white/20 rounded-full px-4 md:px-6 py-3 md:py-4 flex justify-between items-center shadow-2xl shadow-brand-charcoal/50">
            <a href="../../../index.html" class="group text-xl font-display uppercase tracking-wider text-white hover:text-brand-highlight transition-colors flex items-center gap-2">
                AKM<span class="text-brand-stormy group-hover:text-white">.</span>
            </a>
            
            <div class="hidden md:flex items-center gap-8 text-xs font-bold uppercase tracking-widest text-brand-lavender">
                <a href="../powerbi.html" class="hover:text-white transition-colors"><i class="fa-solid fa-arrow-left mr-1"></i> Back to PowerBI</a>
            </div>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <header class="relative min-h-[40vh] flex flex-col justify-center items-center px-4 overflow-hidden pt-24 pb-12">
        <div class="text-center z-10 relative">
            <h1 class="text-[8vw] md:text-[5vw] leading-[0.8] font-display uppercase text-brand-highlight select-none drop-shadow-xl">
                PRISM SALES
            </h1>
            <p class="mt-4 text-sm md:text-md font-mono text-brand-lavender py-1 inline-block bg-brand-stormy/20 px-4 rounded-full border border-brand-stormy/50">
                LIVE CSV DATA DASHBOARD
            </p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-6 pb-20 relative z-10">
        
        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="loader mb-4"></div>
            <p class="font-mono text-sm uppercase tracking-widest animate-pulse">Loading Dataset...</p>
        </div>

        <div id="dashboard" class="hidden">
            <!-- KPI Cards -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="card-3d p-6 rounded-lg flex flex-col border-l-4 border-l-brand-highlight">
                    <span class="font-mono text-xs text-gray-400 uppercase tracking-widest mb-1">Total Sales</span>
                    <span class="text-3xl font-display text-white" id="kpi-sales">$0</span>
                </div>
                <div class="card-3d p-6 rounded-lg flex flex-col border-l-4 border-l-brand-positive">
                    <span class="font-mono text-xs text-gray-400 uppercase tracking-widest mb-1">Total Profit</span>
                    <span class="text-3xl font-display text-white" id="kpi-profit">$0</span>
                </div>
                <div class="card-3d p-6 rounded-lg flex flex-col border-l-4 border-l-[#48cae4]">
                    <span class="font-mono text-xs text-gray-400 uppercase tracking-widest mb-1">Total Orders</span>
                    <span class="text-3xl font-display text-white" id="kpi-orders">0</span>
                </div>
                <div class="card-3d p-6 rounded-lg flex flex-col border-l-4 border-l-[#d5cfe1]">
                    <span class="font-mono text-xs text-gray-400 uppercase tracking-widest mb-1">Avg Profit Margin</span>
                    <span class="text-3xl font-display text-white" id="kpi-margin">0%</span>
                </div>
            </div>

            <!-- Charts -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                <!-- Sales by Category (Bar) -->
                <div class="card-3d p-6 rounded-lg relative">
                    <h3 class="font-mono text-sm text-gray-300 uppercase tracking-widest mb-4 border-b border-white/10 pb-2">Sales by Category</h3>
                    <div class="relative h-64 w-full">
                        <canvas id="categoryChart"></canvas>
                    </div>
                </div>

                <!-- Sales & Profit by Region (Bar) -->
                <div class="card-3d p-6 rounded-lg relative">
                    <h3 class="font-mono text-sm text-gray-300 uppercase tracking-widest mb-4 border-b border-white/10 pb-2">Sales & Profit by Region</h3>
                    <div class="relative h-64 w-full">
                        <canvas id="regionChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-8 mb-8">
                <!-- Monthly Sales Trend (Line) -->
                <div class="card-3d p-6 rounded-lg relative">
                    <h3 class="font-mono text-sm text-gray-300 uppercase tracking-widest mb-4 border-b border-white/10 pb-2">Monthly Sales Trend</h3>
                    <div class="relative h-80 w-full">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Payment Mode Distribution (Pie) -->
                <div class="card-3d p-6 rounded-lg relative">
                    <h3 class="font-mono text-sm text-gray-300 uppercase tracking-widest mb-4 border-b border-white/10 pb-2">Payment Mode Preference</h3>
                    <div class="relative h-64 w-full flex justify-center">
                        <canvas id="paymentChart"></canvas>
                    </div>
                </div>
                
                <!-- Segment Distribution (Doughnut) -->
                <div class="card-3d p-6 rounded-lg relative">
                    <h3 class="font-mono text-sm text-gray-300 uppercase tracking-widest mb-4 border-b border-white/10 pb-2">Sales by Segment</h3>
                    <div class="relative h-64 w-full flex justify-center">
                        <canvas id="segmentChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // Set Chart.js Defaults for dark theme
        Chart.defaults.color = '#d5cfe1';
        Chart.defaults.font.family = 'Manrope';
        
        const dataPath = '../../../Data/Prism_Sales_Dataset.csv';

        Papa.parse(dataPath, {
            download: true,
            header: true,
            dynamicTyping: true,
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                processDataAndRender(data);
            },
            error: function(error) {
                console.error("Error fetching CSV: ", error);
                document.getElementById('loading').innerHTML = '<p class="text-red-500 font-mono">Error loading dataset. Make sure you are running via a local server.</p>';
            }
        });

        function processDataAndRender(data) {
            let totalSales = 0;
            let totalProfit = 0;
            
            const categorySales = {};
            const regionData = {};
            const paymentMode = {};
            const segmentSales = {};
            const monthlyTrend = {};

            data.forEach(row => {
                let sales = parseFloat(row['Sales']) || 0;
                let profit = parseFloat(row['Profit']) || 0;
                let cat = row['Category'] || 'Unknown';
                let reg = row['Region'] || 'Unknown';
                let pay = row['Payment Mode'] || 'Unknown';
                let seg = row['Segment'] || 'Unknown';
                let dateStr = row['Order Date']; // typically DD-MM-YYYY or MM/DD/YYYY

                totalSales += sales;
                totalProfit += profit;

                // Category
                categorySales[cat] = (categorySales[cat] || 0) + sales;
                
                // Region
                if (!regionData[reg]) regionData[reg] = { sales: 0, profit: 0 };
                regionData[reg].sales += sales;
                regionData[reg].profit += profit;

                // Payment Mode
                paymentMode[pay] = (paymentMode[pay] || 0) + 1; // Count of orders

                // Segment
                segmentSales[seg] = (segmentSales[seg] || 0) + sales;

                // Trend (Extract Year-Month)
                if (dateStr) {
                    let parts = dateStr.includes('-') ? dateStr.split('-') : dateStr.split('/');
                    if(parts.length === 3) {
                        // Assuming DD-MM-YYYY based on typical datasets, let's normalize to YYYY-MM
                        // If it's MM/DD/YYYY, we might need a different check, but let's assume middle is Month or first is Month.
                        // Standard superstore is usually MM/DD/YYYY or DD/MM/YYYY. Let's just group by year-month roughly.
                        let year = parts[2].length === 4 ? parts[2] : (parts[2].length===2 ? '20'+parts[2] : parts[0]);
                        let month = parts[1]; // Often month is in middle, but sometimes first. Let's assume MM-DD-YYYY or DD-MM-YYYY, month is parts[0] or parts[1].
                        // Let's just use whatever it is to form a key, sort it later if poss.
                        let key = year + '-' + month.padStart(2, '0');
                        if (!monthlyTrend[key]) monthlyTrend[key] = 0;
                        monthlyTrend[key] += sales;
                    }
                }
            });

            // Update KPIs
            document.getElementById('kpi-sales').innerText = '$' + totalSales.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0});
            document.getElementById('kpi-profit').innerText = '$' + totalProfit.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0});
            document.getElementById('kpi-orders').innerText = data.length.toLocaleString();
            let margin = totalSales > 0 ? (totalProfit / totalSales) * 100 : 0;
            document.getElementById('kpi-margin').innerText = margin.toFixed(1) + '%';
            
            // Hide Loader, Show Dashboard
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';

            renderCharts(categorySales, regionData, paymentMode, segmentSales, monthlyTrend);
        }

        function renderCharts(categorySales, regionData, paymentMode, segmentSales, monthlyTrend) {
            // Category Bar Chart
            new Chart(document.getElementById('categoryChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(categorySales),
                    datasets: [{
                        label: 'Sales ($)',
                        data: Object.values(categorySales),
                        backgroundColor: 'rgba(243, 198, 35, 0.8)',
                        borderColor: '#f3c623',
                        borderWidth: 1,
                        borderRadius: 4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            // Region Chart (Grouped Bar for Sales & Profit)
            const regLabels = Object.keys(regionData);
            const regSales = regLabels.map(l => regionData[l].sales);
            const regProfit = regLabels.map(l => regionData[l].profit);
            new Chart(document.getElementById('regionChart'), {
                type: 'bar',
                data: {
                    labels: regLabels,
                    datasets: [
                        { label: 'Sales', data: regSales, backgroundColor: 'rgba(72, 202, 228, 0.8)' },
                        { label: 'Profit', data: regProfit, backgroundColor: 'rgba(0, 250, 154, 0.8)' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // Trend Chart
            const sortedTrendKeys = Object.keys(monthlyTrend).sort();
            const trendData = sortedTrendKeys.map(k => monthlyTrend[k]);
            new Chart(document.getElementById('trendChart'), {
                type: 'line',
                data: {
                    labels: sortedTrendKeys,
                    datasets: [{
                        label: 'Monthly Sales',
                        data: trendData,
                        borderColor: '#f3c623',
                        backgroundColor: 'rgba(243, 198, 35, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // Payment Pie Chart
            new Chart(document.getElementById('paymentChart'), {
                type: 'pie',
                data: {
                    labels: Object.keys(paymentMode),
                    datasets: [{
                        data: Object.values(paymentMode),
                        backgroundColor: ['#f3c623', '#48cae4', '#00FA9A', '#FF6347', '#d5cfe1'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // Segment Doughnut Chart
            new Chart(document.getElementById('segmentChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(segmentSales),
                    datasets: [{
                        data: Object.values(segmentSales),
                        backgroundColor: ['#48cae4', '#006466', '#d5cfe1', '#f3c623'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: '70%' }
            });
        }
    </script>
</body>
</html>
